# Publica el sitio en GitHub Pages: el relato (output/historias.html) como
# portada en la raíz — copiado también como index.html —, metodologia|datos
# como páginas hermanas, el working paper generado desde docs/WORKING-PAPER.md
# (scripts/build_working_paper.py, así nunca diverge del markdown) y el panel
# interactivo (web/) bajo app/. Los enlaces relativos entre páginas funcionan
# porque todas viven en la raíz salvo la app, que enlaza hacia arriba.
#
# Despliegue SOLO MANUAL (decisión del usuario, jul-2026): se lanza desde la
# pestaña Actions → "Deploy site (GitHub Pages)" → Run workflow, sobre main.
# Ni el merge ni ningún push publican nada: el usuario revisa los textos y
# decide cuándo salir. (Si algún día se quiere autodeploy al merge, basta
# añadir aquí un trigger `push: branches: [main]`.)
#
# Requisito de una sola vez: Settings → Pages → Source = "GitHub Actions"
# (configure-pages intenta activarlo solo con `enablement: true`).
name: Deploy site (GitHub Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build app + assemble site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Build (base = /<repo>/app/)
        run: npm run build
        working-directory: web
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/app/"
      - name: Build working paper (md -> html)
        run: |
          pip install "markdown>=3.5"
          python scripts/build_working_paper.py --out _site/working-paper.html
      - name: Assemble site (historias como portada + app bajo app/)
        run: |
          mkdir -p _site/app
          cp -r web/dist/* _site/app/
          # historias.html es la portada; se mantiene también con su nombre
          # para que los enlaces existentes entre páginas sigan funcionando.
          cp output/historias.html _site/index.html
          cp output/historias.html output/metodologia.html output/datos.html _site/
          # imagen de la tarjeta social (Open Graph/Twitter): las tres páginas la
          # referencian por URL absoluta, así que debe vivir en la raíz del sitio.
          cp output/og-cover.png _site/
          # tablas tidy canónicas: alimentan los enlaces «↓ CSV» de cada gráfico
          # y el bloque «datos completos» del pie (rutas datos/procesado/tablas/*.csv).
          mkdir -p _site/datos/procesado/tablas
          cp datos/procesado/tablas/*.csv _site/datos/procesado/tablas/
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
