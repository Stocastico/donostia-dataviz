# Publica el sitio en GitHub Pages: el panel interactivo (web/) en la raíz y
# el relato autocontenido (output/historias|metodologia|datos.html) como
# páginas hermanas, de modo que los enlaces relativos entre ellas funcionan.
#
# Despliegue SOLO MANUAL (decisión del usuario, jul-2026): se lanza desde la
# pestaña Actions → "Deploy site (GitHub Pages)" → Run workflow, sobre main.
# Ni el merge ni ningún push publican nada: el usuario revisa los textos y
# decide cuándo salir. (Si algún día se quiere autodeploy al merge, basta
# añadir aquí un trigger `push: branches: [main]`.)
#
# Requisito de una sola vez: Settings → Pages → Source = "GitHub Actions"
# (configure-pages intenta activarlo solo con `enablement: true`).
name: Deploy site (GitHub Pages)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build app + assemble site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Build (base = /<repo>/)
        run: npm run build
        working-directory: web
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
      - name: Assemble site (app en la raíz + relato como hermanas)
        run: |
          mkdir -p _site
          cp -r web/dist/* _site/
          cp output/historias.html output/metodologia.html output/datos.html _site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
