name: Donostia Dataviz CI

# docs/README/output entran en los paths porque test_doc_counts.py ata los
# recuentos citados en la prosa a web/src/data: editar solo un doc también
# debe pasar por ese candado.
on:
  push:
    paths:
      - "data-pipeline/**"
      - "analysis/**"
      - "web/**"
      - "docs/**"
      - "output/**"
      - "README.md"
      - ".github/workflows/donostia-dataviz.yml"
  pull_request:
    paths:
      - "data-pipeline/**"
      - "analysis/**"
      - "web/**"
      - "docs/**"
      - "output/**"
      - "README.md"

jobs:
  pipeline:
    name: Pipeline tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pipeline
        run: pip install -e ".[dev]"
        working-directory: data-pipeline
      - name: Run tests
        run: pytest -q
        working-directory: data-pipeline
      # Invocación separada: los tests del pipeline importan su propio conftest
      # por nombre (from conftest import ...), que chocaría con el conftest de
      # analysis/tests si se recogieran en la misma sesión de pytest.
      - name: Run analysis tests
        run: pytest -q ../analysis/tests
        working-directory: data-pipeline

  web:
    name: Frontend build & test (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Test
        run: npm test
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
