name: Donostia Dataviz CI

on:
  push:
    paths:
      - "data-pipeline/**"
      - "web/**"
      - ".github/workflows/donostia-dataviz.yml"
  pull_request:
    paths:
      - "data-pipeline/**"
      - "web/**"

jobs:
  pipeline:
    name: Pipeline tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pipeline
        run: pip install -e ".[dev]"
        working-directory: data-pipeline
      - name: Run tests
        run: pytest -q
        working-directory: data-pipeline

  web:
    name: Frontend build & test (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web
      - name: Test
        run: npm test
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
